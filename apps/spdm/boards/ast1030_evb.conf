# GPIO
CONFIG_GPIO=y
CONFIG_GPIO_ASPEED_SGPIOM=y
CONFIG_GPIO_ASPEED=y

# SPIO
CONFIG_SPI=y
CONFIG_SPI_ASPEED=y
CONFIG_SPI_NOR=n
CONFIG_SPI_NOR_MULTI_DEV=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y

# i2C
CONFIG_I2C=y
CONFIG_I2C_ASPEED=y
CONFIG_I2C_TARGET=n

# I3C
CONFIG_I3C=y
CONFIG_I3C_ASPEED=y
CONFIG_I3C_USE_IBI=y
CONFIG_I3C_IBI_WORKQUEUE=y

# CRYPTO
CONFIG_CRYPTO=y
CONFIG_CRYPTO_ASPEED=y
CONFIG_RSA_ASPEED=y
CONFIG_HASH_SHELL=y
CONFIG_CRYPTO_SHELL=y
CONFIG_RSA_SHELL=y
CONFIG_ECDSA_SHELL=y
CONFIG_ENTROPY_ASPEED_TRNG=y

# TIMER/WATCHDOG
CONFIG_WATCHDOG=y
CONFIG_WDT_ASPEED=y
CONFIG_TIMER_ASPEED=y

# MISC
CONFIG_HWINFO=y
CONFIG_JTAG=n
CONFIG_SENSOR=n
CONFIG_REBOOT=y
CONFIG_JTAG_ASPEED=y
CONFIG_ABR_FLOW_CTRL_ASPEED=y
